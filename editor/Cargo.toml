[package]
name = "editor"
version = "0.1.0"
edition = "2024"

[features]
# profiling
tracy = ["tracy-client/enable"]

[dependencies]
memchr             .workspace = true
smallstr           .workspace = true
smallvec           .workspace = true
cranelift-entity   .workspace = true
paste              .workspace = true
winit              .workspace = true
crossbeam-channel  .workspace = true
libloading         .workspace = true
tracy-client       .workspace = true

pollster = "0.3"
bytemuck = { version = "1", features = ["derive"] }
bitflags = "2.11.0"
ropey = "1.6.1"
tempfile = { version = "3.27.0", default-features = false }
swash = { version = "0.2.7", default-features = false, features = ["scale", "std", "render"] }
rodio = { version = "0.22.2", default-features = false, features = ["playback", "wav"] }
dirs = { version = "6.0.0", default-features = false }
arboard = { version = "3.6.1", features = ["wayland-data-control"], default-features = false }
wgpu = { version = "28.0.0", default-features = false, features = ["vulkan", "wgsl", "std"] }
tree-sitter-rust = "0.24.2"
tree-sitter = "0.26.8"
papaya = "0.2.4"
ecow = "0.2.6"
dashmap = "6.1.0"
rustc-hash = "2.1.2"
nohash-hasher = "0.2.0"