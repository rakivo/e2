[package]
name = "editor"
version = "0.1.0"
edition = "2024"

[features]
# profiling
tracy = ["tracy-client/enable"]

[dependencies]
memchr             .workspace = true
smallstr           .workspace = true
smallvec           .workspace = true
cranelift-entity   .workspace = true
paste              .workspace = true
winit              .workspace = true
crossbeam-channel  .workspace = true
libloading         .workspace = true
tracy-client       .workspace = true

pollster = "0.3"
bytemuck = { version = "1", features = ["derive"] }
bitflags = "2.11.0"
ropey = "1.6.1"
tempfile = "3.27.0"
swash = "0.2.7"
rodio = { version = "0.22.2", default-features = false, features = ["playback", "wav"] }
dirs = "6.0.0"
arboard = { version = "3.6.1", features = ["wayland-data-control"], default-features = false }
wgpu = { version = "28.0.0", default-features = false, features = ["vulkan", "wgsl", "std"] }