[workspace]
members = ["editor", "core", "editor-macros", "custom"]
resolver = "2"

[workspace.dependencies]
rustc-edit-distance = "0.1.0"
memchr = "2.8.0"
winit = { version = "0.30.13", features = ["wayland", "x11"] }
cranelift-entity = "0.129.1"
smallstr = { version = "0.3", features = ["union"] }
wgpu = { version = "28.0.0", default-features = false, features = ["vulkan", "wgsl", "std"] }
smallvec = "1.15.1"
paste = "1.0.15"

[profile.release]
debug = 1

[profile.release-fast-but-without-lto]
inherits = "release"
opt-level = 3
panic = "abort"
lto = false
codegen-units = 1
debug = false
strip = true
debug-assertions = false
overflow-checks = false

[profile.release-fast]
inherits = "release"
opt-level = 3
panic = "abort"
codegen-units = 1
lto = "fat"
debug = false
strip = true
debug-assertions = false
overflow-checks = false
