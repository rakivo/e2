[workspace]
members = ["editor", "core", "editor-macros", "custom"]
resolver = "2"

[workspace.dependencies]
editor = { path = "../editor" }
editor-macros = { path = "../editor-macros" }

rustc-edit-distance = "0.1.0"
memchr = "2.8.0"
winit = { version = "0.30.13", features = ["wayland", "x11"] }
cranelift-entity = "0.129.1"
smallstr = { version = "0.3", features = ["union"] }
smallvec = "1.15.1"
paste = "1.0.15"
crossbeam-channel = "0.5.15"
libloading = "0.9.0"
tracy-client = { version = "0.17.3", default-features = false }

[profile.release]
debug = 1

[profile.release-fast-but-without-lto]
inherits = "release"
opt-level = 3
panic = "abort"
lto = false
codegen-units = 1
debug = false
strip = true
debug-assertions = false
overflow-checks = false

[profile.release-fast]
inherits = "release"
opt-level = 3
panic = "abort"
codegen-units = 1
lto = "fat"
debug = false
strip = true
debug-assertions = false
overflow-checks = false
