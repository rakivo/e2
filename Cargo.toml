[package]
name = "naysayer"
version = "0.1.0"
edition = "2024"

[features]
default = ["mimalloc"]

dhat = ["dep:dhat"]
mimalloc = ["dep:mimalloc"]

# profiling
tracy = ["tracy-client/enable"]

[dependencies]
winit = { version = "0.30.13", features = ["wayland", "x11"] }
wgpu = { version = "28.0.0", default-features = false, features = ["vulkan", "wgsl", "std"] }
pollster = "0.3"
fontdue = "0.9"
bytemuck = { version = "1", features = ["derive"] }
smallstr = { version = "0.3", features = ["union"] }
cranelift-entity = "0.129.1"
bitflags = "2.11.0"
smallvec = "1.15.1"
dhat = { version = "0.3.3", optional = true }
ropey = "1.6.1"
paste = "1.0.15"
inventory = "0.3.24"
tracy-client = { version = "0.17.3", default-features = false }
memchr = "2.8.0"
rustc-edit-distance = "0.1.0"
mimalloc = { version = "=0.1.47", optional = true }
crossbeam-channel = "0.5.15"
parking_lot = "0.12.5"
dirs = "6.0.0"
memmap2 = "0.9.10"
ctrlc = "3.5.2"
arboard = "3.6.1"

[profile.release]
debug = 1

[profile.release-fast-but-without-lto]
inherits = "release"
opt-level = 3
panic = "abort"
codegen-units = 1
debug = false
strip = true
debug-assertions = false
overflow-checks = false

[profile.release-fast]
inherits = "release"
opt-level = 3
panic = "abort"
codegen-units = 1
lto = "fat"
debug = false
strip = true
debug-assertions = false
overflow-checks = false
